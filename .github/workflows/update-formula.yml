name: Update Formula

# Rewrites Formula/k9s.rb when the k9s build workflow publishes a new custom
# release. Triggered via repository_dispatch (event_type: update-formula) from
# ventsislav-georgiev/k9s, or manually via workflow_dispatch.

on:
  repository_dispatch:
    types: [update-formula]
  workflow_dispatch:
    inputs:
      version:
        description: 'Formula version (no leading v, e.g. 0.50.18-custom.1)'
        required: true
      tag:
        description: 'Release tag (e.g. v0.50.18-custom.1)'
        required: true
      sha256:
        description: 'sha256 of k9s_Darwin_arm64.tar.gz'
        required: true
      url:
        description: 'Download URL of the tarball'
        required: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.event.client_payload.version || github.event.inputs.version }}
      SHA256: ${{ github.event.client_payload.sha256 || github.event.inputs.sha256 }}
      URL: ${{ github.event.client_payload.url || github.event.inputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1

      - name: Render formula
        run: |
          cat > Formula/k9s.rb <<EOF
          # typed: false
          # frozen_string_literal: true

          # This file is generated by the update-formula workflow. DO NOT EDIT.
          class K9s < Formula
            desc "Kubernetes CLI To Manage Your Clusters In Style!"
            homepage "https://k9scli.io/"
            version "${VERSION}"

            on_macos do
              on_arm do
                url "${URL}"
                sha256 "${SHA256}"

                def install
                  bin.install "k9s"
                end
              end
            end

            test do
              system "k9s version"
            end
          end
          EOF

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/k9s.rb
          if git diff --cached --quiet; then
            echo "No formula changes."
          else
            git commit -m "k9s ${VERSION}"
            git push
          fi
